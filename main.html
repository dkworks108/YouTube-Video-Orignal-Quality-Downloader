<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Gradient UI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1f1c2c);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
}

/* Gradient animation */

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating box style */

.box{
position:absolute;
bottom:-100px;
width:80px;
height:80px;
background:rgba(0,150,255,0.35);
border-radius:12px;
box-shadow:0 0 20px rgba(0,150,255,0.8);
animation:floatUp linear infinite;
}

/* Floating animation */

@keyframes floatUp{
0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}
10%{
opacity:1;
}
100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

/* Different boxes */

.box:nth-child(1){
left:10%;
animation-duration:12s;
}

.box:nth-child(2){
left:25%;
animation-duration:15s;
width:60px;
height:60px;
}

.box:nth-child(3){
left:40%;
animation-duration:18s;
}

.box:nth-child(4){
left:55%;
animation-duration:14s;
width:100px;
height:100px;
}

.box:nth-child(5){
left:70%;
animation-duration:17s;
}

.box:nth-child(6){
left:85%;
animation-duration:13s;
}

/* Center text */

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
}

.center h1{
font-size:42px;
margin-bottom:10px;
}
